<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewsWizard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <h5>NewsWizard</h5>
      <span>Campaign Studio</span>
    </div>

    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/recipients">Recipients</a>
      <a href="/schedules">Schedules</a>
    </nav>



    <div class="user-box">
      <p>Signed in as</p>
      <strong>{{ session_email }}</strong>
      <a href="/logout" class="btn btn-sm btn-outline-light mt-2">Logout</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <h1>Base Layout</h1>
    <p class="text-muted">
      This file is kept as a simple layout reference. Your pages are now standalone
      (no <code>{% extends %}</code> or <code>{% block %}</code>).
    </p>
  </main>

</div>
</body>
</html>
